services:
  zs-config:
    build: .
    image: zs-config:latest
    container_name: zs-config
    restart: unless-stopped
    ports:
      # BIND_ADDR controls which interface the ports are bound to.
      # 127.0.0.1 (default) = localhost-only; 0.0.0.0 = all interfaces (server deployment).
      # Set BIND_ADDR in your .env file or pass it in the environment.
      - "${BIND_ADDR:-127.0.0.1}:8000:8000"
      - "${BIND_ADDR:-127.0.0.1}:8443:8443"
    volumes:
      - zs-db:/data/db
      - zs-plugins:/data/plugins
    environment:
      ZS_CONTAINER_MODE: "1"
      ZSCALER_DB_PATH: /data/db/zscaler.db
      ZS_PLUGIN_DIR: /data/plugins
      PYTHONUSERBASE: /data/plugins
      JWT_SECRET: ${JWT_SECRET}
      # Lock down CORS in production — comma-separated list of allowed origins
      # ALLOWED_ORIGINS: "https://your-host.example.com:8443"
      # When SSL is active, update both of these to the HTTPS origin:
      # ALLOWED_ORIGINS: "https://your-host.example.com:8443"
      # WEBAUTHN_ORIGIN: "https://your-host.example.com:8443"
      # Override the build-time CA bundle at runtime (e.g. if cert changes after image build)
      # REQUESTS_CA_BUNDLE: /data/db/ca-bundle.pem
      # TUI-only mode: set to "1" to launch the TUI directly instead of the web UI.
      # Access via: docker exec -it zs-config python -m cli.z_config
      # The HEALTHCHECK will fail in TUI mode — add "healthcheck: disable" to your override.
      # ZS_TUI_ONLY: "1"
      # Column-level encryption algorithm. Must match the algorithm used to encrypt
      # client_secret_enc. Only set this if you have rotated away from the default.
      # ZSCALER_ENCRYPTION_ALGORITHM: "fernet"
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  zs-db:
    external: true
    name: zs-config_zs-db
  zs-plugins:
    external: true
    name: zs-config_zs-plugins
